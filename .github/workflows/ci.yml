name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # Covers the declared `engines.node` floor (22.x, current LTS) and
        # the bleeding edge. Node 18 and 20 are omitted: 18 is EOL, 20
        # reaches EOL 2026-04-30, and `signalk-server` itself requires
        # `>=22` so any version below that is fiction for a consumer.
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run prettier:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        if: matrix.node-version != '24.x'
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '24.x'
        shell: bash
        run: |
          set -eo pipefail
          npm run coverage | tee coverage.log

      - name: Coverage step summary
        if: matrix.node-version == '24.x'
        shell: bash
        run: |
          {
            echo '## Test Coverage'
            echo
            echo '```'
            cat coverage.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage (lcov) as artifact
        if: matrix.node-version == '24.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 30
